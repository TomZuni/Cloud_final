name: Build, Push to S3 and Deploy to EC2

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  S3_BUCKET: cdy2204-artefactos-tomas
  PRODUCTOR_JAR: ms-productor-mensajes-1.0.0.jar
  CONSUMIDOR_JAR: ms-consumidor-mensajes-1.0.0.jar

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Compilar ms-productor-mensajes
        working-directory: ./microservicios/ms-productor-mensajes
        run: ./mvnw clean package -DskipTests

      - name: Compilar ms-consumidor-mensajes
        working-directory: ./microservicios/ms-consumidor-mensajes
        run: ./mvnw clean package -DskipTests

      - name: Configurar credenciales AWS (Learner Lab)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Subir jar del productor a S3
        run: |
          aws s3 cp microservicios/ms-productor-mensajes/target/${{ env.PRODUCTOR_JAR }} \
            s3://${{ env.S3_BUCKET }}/${{ env.PRODUCTOR_JAR }}

      - name: Subir jar del consumidor a S3
        run: |
          aws s3 cp microservicios/ms-consumidor-mensajes/target/${{ env.CONSUMIDOR_JAR }} \
            s3://${{ env.S3_BUCKET }}/${{ env.CONSUMIDOR_JAR }}

  deploy-to-ec2:
    needs: build-and-upload
    runs-on: ubuntu-latest
    steps:
      - name: Conectarse a EC2 y desplegar
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Credenciales temporales del Learner Lab (mismas que usa GitHub Actions)
            mkdir -p ~/.aws
            cat > ~/.aws/credentials << EOF
            [default]
            aws_access_key_id=${{ secrets.AWS_ACCESS_KEY_ID }}
            aws_secret_access_key=${{ secrets.AWS_SECRET_ACCESS_KEY }}
            aws_session_token=${{ secrets.AWS_SESSION_TOKEN }}
            EOF

            mkdir -p ~/app
            cd ~/app

            # Descargar los jars más recientes desde S3
            aws s3 cp s3://${{ env.S3_BUCKET }}/${{ env.PRODUCTOR_JAR }} .
            aws s3 cp s3://${{ env.S3_BUCKET }}/${{ env.CONSUMIDOR_JAR }} .

            # Asegurar que RabbitMQ está corriendo
            if [ ! "$(docker ps -q -f name=rabbitmq)" ]; then
              docker run -d --name rabbitmq -p 5672:5672 -p 15672:15672 rabbitmq:3-management
            fi

            # Reiniciar los microservicios (si usas systemd)
            sudo systemctl restart ms-productor ms-consumidor || {
              # Fallback si no configuraste systemd: mata procesos java previos y relanza
              pkill -f ${{ env.PRODUCTOR_JAR }} || true
              pkill -f ${{ env.CONSUMIDOR_JAR }} || true
              sleep 2
              nohup java -jar ~/app/${{ env.PRODUCTOR_JAR }} > ~/app/productor.log 2>&1 &
              nohup java -jar ~/app/${{ env.CONSUMIDOR_JAR }} > ~/app/consumidor.log 2>&1 &
            }
